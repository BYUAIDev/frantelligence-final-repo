<svg viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
  <title>Before System Diagram</title>
  <desc>Email-first workflow with multiple handoffs before documentation is published.</desc>
  <defs>
    <linearGradient id="beforeBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1722" />
      <stop offset="100%" stop-color="#0a1018" />
    </linearGradient>
    <linearGradient id="beforeCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172131" />
      <stop offset="100%" stop-color="#111a28" />
    </linearGradient>
    <marker id="beforeArrow" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#fcae7b" />
    </marker>
    <style>
      .title { fill: #f8fafc; font: 700 38px Inter, Segoe UI, sans-serif; }
      .subtitle { fill: #fda678; font: 600 19px Inter, Segoe UI, sans-serif; letter-spacing: 0.06em; text-transform: uppercase; }
      .node { fill: url(#beforeCard); stroke: #fb923c; stroke-width: 2; stroke-opacity: 0.52; }
      .nodeTitle { fill: #ffedd5; font: 700 20px Inter, Segoe UI, sans-serif; }
      .nodeText { fill: #cbd5e1; font: 400 16px Inter, Segoe UI, sans-serif; }
      .loopText { fill: #fdba74; font: 600 16px Inter, Segoe UI, sans-serif; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="800" fill="url(#beforeBg)" />

  <text x="700" y="72" text-anchor="middle" class="title">Before: Email-Centric Documentation Loop</text>
  <text x="700" y="106" text-anchor="middle" class="subtitle">many handoffs, slower closure</text>

  <rect x="60" y="170" width="180" height="138" rx="14" ry="14" class="node" />
  <text x="150" y="210" text-anchor="middle" class="nodeTitle">1) Ask</text>
  <text x="150" y="238" text-anchor="middle" class="nodeText">Franchiser user</text>
  <text x="150" y="261" text-anchor="middle" class="nodeText">asks question</text>

  <rect x="270" y="170" width="180" height="138" rx="14" ry="14" class="node" />
  <text x="360" y="210" text-anchor="middle" class="nodeTitle">2) Detect</text>
  <text x="360" y="238" text-anchor="middle" class="nodeText">Gap identified</text>
  <text x="360" y="261" text-anchor="middle" class="nodeText">as unanswered</text>

  <rect x="480" y="170" width="180" height="138" rx="14" ry="14" class="node" />
  <text x="570" y="210" text-anchor="middle" class="nodeTitle">3) Notify</text>
  <text x="570" y="238" text-anchor="middle" class="nodeText">Email sent to</text>
  <text x="570" y="261" text-anchor="middle" class="nodeText">franchisee</text>

  <rect x="690" y="170" width="180" height="138" rx="14" ry="14" class="node" />
  <text x="780" y="210" text-anchor="middle" class="nodeTitle">4) Approve</text>
  <text x="780" y="238" text-anchor="middle" class="nodeText">Franchisee approves</text>
  <text x="780" y="261" text-anchor="middle" class="nodeText">new document</text>

  <rect x="900" y="170" width="180" height="138" rx="14" ry="14" class="node" />
  <text x="990" y="210" text-anchor="middle" class="nodeTitle">5) Draft</text>
  <text x="990" y="238" text-anchor="middle" class="nodeText">AI writes</text>
  <text x="990" y="261" text-anchor="middle" class="nodeText">new document</text>

  <rect x="1110" y="170" width="230" height="138" rx="14" ry="14" class="node" />
  <text x="1225" y="210" text-anchor="middle" class="nodeTitle">6) Review + Approve</text>
  <text x="1225" y="238" text-anchor="middle" class="nodeText">Franchisee receives via email</text>
  <text x="1225" y="261" text-anchor="middle" class="nodeText">and approves document</text>

  <rect x="560" y="474" width="280" height="138" rx="14" ry="14" class="node" />
  <text x="700" y="514" text-anchor="middle" class="nodeTitle">7) Publish</text>
  <text x="700" y="542" text-anchor="middle" class="nodeText">Document submitted</text>
  <text x="700" y="565" text-anchor="middle" class="nodeText">and made available</text>

  <line x1="240" y1="239" x2="270" y2="239" stroke="#fb923c" stroke-width="2.5" marker-end="url(#beforeArrow)" />
  <line x1="450" y1="239" x2="480" y2="239" stroke="#fb923c" stroke-width="2.5" marker-end="url(#beforeArrow)" />
  <line x1="660" y1="239" x2="690" y2="239" stroke="#fb923c" stroke-width="2.5" marker-end="url(#beforeArrow)" />
  <line x1="870" y1="239" x2="900" y2="239" stroke="#fb923c" stroke-width="2.5" marker-end="url(#beforeArrow)" />
  <line x1="1080" y1="239" x2="1110" y2="239" stroke="#fb923c" stroke-width="2.5" marker-end="url(#beforeArrow)" />
  <path d="M1225 308 L1225 400 L700 400 L700 474" fill="none" stroke="#fb923c" stroke-width="2.5" marker-end="url(#beforeArrow)" />
  <path d="M560 544 L315 544 L315 308" fill="none" stroke="#fb923c" stroke-width="2.5" stroke-dasharray="8 8" marker-end="url(#beforeArrow)" />
  <text x="332" y="520" class="loopText">long feedback cycle</text>
</svg>
