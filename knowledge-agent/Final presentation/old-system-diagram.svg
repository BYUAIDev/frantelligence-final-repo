<svg width="1400" height="800" viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f15"/>
      <stop offset="100%" stop-color="#121a24"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#7dd3fc"/>
    </marker>
    <style>
      .title { fill: #f8fafc; font: 700 42px Inter, Segoe UI, sans-serif; }
      .label { fill: #dbe4ef; font: 600 24px Inter, Segoe UI, sans-serif; }
      .body { fill: #9fb0c4; font: 400 18px Inter, Segoe UI, sans-serif; }
      .box { fill: #111a25; stroke: #7dd3fc; stroke-opacity: 0.45; stroke-width: 2; rx: 16; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="800" fill="url(#bg)"/>
  <text x="700" y="80" text-anchor="middle" class="title">Old System Diagram (Placeholder)</text>

  <rect x="120" y="230" width="320" height="220" class="box"/>
  <text x="280" y="290" text-anchor="middle" class="label">User Questions</text>
  <text x="280" y="330" text-anchor="middle" class="body">Questions come in</text>
  <text x="280" y="360" text-anchor="middle" class="body">and are logged</text>

  <rect x="540" y="230" width="320" height="220" class="box"/>
  <text x="700" y="290" text-anchor="middle" class="label">Unanswered Queue</text>
  <text x="700" y="330" text-anchor="middle" class="body">System compiles all</text>
  <text x="700" y="360" text-anchor="middle" class="body">unanswered questions</text>

  <rect x="960" y="230" width="320" height="220" class="box"/>
  <text x="1120" y="290" text-anchor="middle" class="label">Manual Human Work</text>
  <text x="1120" y="330" text-anchor="middle" class="body">A real person reviews</text>
  <text x="1120" y="360" text-anchor="middle" class="body">and answers manually</text>

  <line x1="440" y1="340" x2="540" y2="340" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="860" y1="340" x2="960" y2="340" stroke="#7dd3fc" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="700" y="700" text-anchor="middle" class="body">Replace this placeholder with final vector/SVG diagram later</text>
</svg>
