<svg width="1400" height="800" viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f16"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="farr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#7dd3fc"/>
    </marker>
    <style>
      .title { fill: #f8fafc; font: 700 40px Inter, Segoe UI, sans-serif; }
      .subtitle { fill: #a5b4c8; font: 400 22px Inter, Segoe UI, sans-serif; }
      .head { fill: #e2e8f0; font: 700 28px Inter, Segoe UI, sans-serif; }
      .text { fill: #cbd5e1; font: 400 19px Inter, Segoe UI, sans-serif; }
      .box { fill: #0f1c2b; stroke: #7dd3fc; stroke-opacity: 0.55; stroke-width: 2; rx: 16; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="800" fill="url(#fbg)"/>
  <text x="700" y="80" text-anchor="middle" class="title">Falsification Stages</text>
  <text x="700" y="120" text-anchor="middle" class="subtitle">Disprove the null hypothesis: test what must be true, not just whether it can work.</text>

  <rect x="80" y="220" width="380" height="360" class="box"/>
  <text x="270" y="280" text-anchor="middle" class="head">1) Pre Falsification</text>
  <text x="270" y="330" text-anchor="middle" class="text">Pitched to clients before build.</text>
  <text x="270" y="365" text-anchor="middle" class="text">Validated that the pain is real</text>
  <text x="270" y="400" text-anchor="middle" class="text">and worth solving.</text>

  <rect x="510" y="220" width="380" height="360" class="box"/>
  <text x="700" y="280" text-anchor="middle" class="head">2) During Falsification</text>
  <text x="700" y="330" text-anchor="middle" class="text">Built and tested in current system.</text>
  <text x="700" y="365" text-anchor="middle" class="text">Confirmed it works without</text>
  <text x="700" y="400" text-anchor="middle" class="text">breaking existing flows.</text>

  <rect x="940" y="220" width="380" height="360" class="box"/>
  <text x="1130" y="280" text-anchor="middle" class="head">3) Post Falsification</text>
  <text x="1130" y="330" text-anchor="middle" class="text">Now test with real client usage.</text>
  <text x="1130" y="365" text-anchor="middle" class="text">Proof is in adoption and whether</text>
  <text x="1130" y="400" text-anchor="middle" class="text">generated docs are actually used.</text>

  <line x1="460" y1="400" x2="510" y2="400" stroke="#7dd3fc" stroke-width="4" marker-end="url(#farr)"/>
  <line x1="890" y1="400" x2="940" y2="400" stroke="#7dd3fc" stroke-width="4" marker-end="url(#farr)"/>
</svg>
